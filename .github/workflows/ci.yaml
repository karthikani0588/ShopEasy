name: CI Pipeline

on:
  push:
    branches: [ main, test ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
      

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: Setup Node.jobs
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      #- name: Run Tests
       # run: npm test